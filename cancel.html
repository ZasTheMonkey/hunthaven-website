<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cancel Reservation — LeaseWild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --color-primary: #2d5a27;
      --color-accent: #c17f3a;
      --color-bg: #f9f6f1;
      --color-surface: #ffffff;
      --color-border: #e4ddd4;
      --color-text: #1a1a18;
      --color-text-muted: #6b6560;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'Satoshi', sans-serif;
      --radius-lg: 14px;
      --radius-full: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .logo { margin-bottom: 1.5rem; }
    h1 { font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; margin-bottom: .5rem; }
    p { font-size: .95rem; color: var(--color-text-muted); line-height: 1.6; }
    .detail-row {
      display: flex; justify-content: space-between;
      font-size: .875rem; padding: .5rem 0;
      border-bottom: 1px solid var(--color-border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row strong { color: var(--color-text); }
    .details-box {
      background: #f9f6f1;
      border-radius: 10px;
      padding: 1rem;
      margin: 1.25rem 0;
      text-align: left;
    }
    .policy-box {
      background: #fffbf5;
      border: 1px solid #e8d5b7;
      border-radius: 10px;
      padding: .85rem 1rem;
      margin: 1rem 0;
      font-size: .82rem;
      color: #7a5a2a;
      text-align: left;
      line-height: 1.55;
    }
    .btn-cancel {
      width: 100%; padding: .85rem;
      background: #ef4444; color: #fff;
      border: none; border-radius: var(--radius-full);
      font-family: var(--font-display); font-weight: 800;
      font-size: 1rem; cursor: pointer; margin-top: .75rem;
    }
    .btn-cancel:disabled { opacity: .6; cursor: not-allowed; }
    .btn-back {
      width: 100%; padding: .75rem;
      background: none; color: var(--color-text-muted);
      border: 1.5px solid var(--color-border); border-radius: var(--radius-full);
      font-family: var(--font-display); font-weight: 700;
      font-size: .95rem; cursor: pointer; margin-top: .6rem;
    }
    .msg { margin-top: 1rem; font-size: .9rem; font-weight: 600; }
    .msg.success { color: var(--color-primary); }
    .msg.error { color: #ef4444; }
    #loading { color: var(--color-text-muted); }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <svg width="130" height="32" viewBox="0 0 130 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="LeaseWild">
        <polyline points="4,6 10,24 16,10 22,24 28,6" stroke="#c17f3a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <ellipse cx="20" cy="7" rx="5" ry="3" fill="#2d5a27" transform="rotate(-30 20 7)"/>
        <text x="36" y="22" font-family="Cabinet Grotesk,sans-serif" font-weight="700" font-size="15" fill="#1a1a18">Lease</text>
        <text x="72" y="22" font-family="Cabinet Grotesk,sans-serif" font-weight="800" font-size="15" fill="#c17f3a">Wild</text>
      </svg>
    </div>

    <div id="loading"><p>Loading your reservation…</p></div>
    <div id="content" style="display:none"></div>
    <div id="done" style="display:none">
      <div style="font-size:3rem;margin-bottom:1rem">✓</div>
      <h1>Reservation Cancelled</h1>
      <p id="done-msg" style="margin-top:.5rem"></p>
      <a href="listings.html" style="display:block;margin-top:1.5rem;color:var(--color-accent);font-weight:700;text-decoration:none">Browse other properties →</a>
    </div>
  </div>

  <script>
    var SB_URL = 'https://teohfzegpoxzimfsmviy.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlb2hmemVncG94emltZnNtdml5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjU3NTQsImV4cCI6MjA5MjA0MTc1NH0.9AVp5qsV8MFLhRtYuMkgybubLBX7-lA_VC-hyA5HYRw';

    var params = new URLSearchParams(window.location.search);
    var bookingId = params.get('id');
    var booking = null;

    async function init() {
      if (!bookingId) {
        document.getElementById('loading').innerHTML = '<p style="color:#ef4444">Invalid cancellation link.</p>';
        return;
      }
      var res = await fetch(SB_URL + '/rest/v1/bookings?id=eq.' + encodeURIComponent(bookingId) + '&select=*', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      var data = await res.json();
      booking = data && data[0];
      if (!booking) {
        document.getElementById('loading').innerHTML = '<p style="color:#ef4444">Reservation not found.</p>';
        return;
      }
      document.getElementById('loading').style.display = 'none';

      if (booking.status === 'cancelled') {
        document.getElementById('content').style.display = 'block';
        document.getElementById('content').innerHTML = '<p style="color:#ef4444;font-weight:700;font-size:1rem">This reservation has already been cancelled.</p><a href="listings.html" style="display:block;margin-top:1.25rem;color:var(--color-accent);font-weight:700;text-decoration:none">Browse other properties →</a>';
        return;
      }

      var cin = booking.checkin || booking.check_in || '';
      var cout = booking.checkout || booking.check_out || '';
      var cinFmt = cin ? new Date(cin+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—';
      var coutFmt = cout ? new Date(cout+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—';
      var hoursUntil = cin ? (new Date(cin+'T00:00:00') - new Date()) / 3600000 : 999;
      var refundEligible = hoursUntil >= 48;
      var total = booking.total ? '$'+parseFloat(booking.total).toFixed(2) : '—';

      var refundMsg = refundEligible
        ? '✓ You are eligible for a <strong>full refund</strong> — your check-in is more than 48 hours away. Refunds will be processed when payments go live July 1, 2026.'
        : '✗ Your check-in is less than 48 hours away. Under our flexible policy, <strong>no refund applies</strong>.';

      document.getElementById('content').style.display = 'block';
      document.getElementById('content').innerHTML = `
        <h1>Cancel Reservation</h1>
        <p style="margin-top:.4rem">Please review your reservation details before cancelling.</p>
        <div class="details-box">
          <div class="detail-row"><span>Guest</span><strong>${booking.guest_name || '—'}</strong></div>
          <div class="detail-row"><span>Check-in</span><strong>${cinFmt}</strong></div>
          <div class="detail-row"><span>Check-out</span><strong>${coutFmt}</strong></div>
          <div class="detail-row"><span>Nights</span><strong>${booking.nights || '—'}</strong></div>
          <div class="detail-row"><span>Total paid</span><strong>${total}</strong></div>
        </div>
        <div class="policy-box">${refundMsg}</div>
        <button class="btn-cancel" id="confirm-btn" onclick="confirmCancel()">Yes, cancel my reservation</button>
        <button class="btn-back" onclick="history.back()">Keep my reservation</button>
        <p class="msg" id="cancel-msg" style="display:none"></p>
      `;
    }

    async function confirmCancel() {
      var btn = document.getElementById('confirm-btn');
      var msg = document.getElementById('cancel-msg');
      btn.disabled = true;
      btn.textContent = 'Cancelling…';
      var res = await fetch(SB_URL + '/rest/v1/bookings?id=eq.' + encodeURIComponent(bookingId), {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json', 'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: 'cancelled', cancelled_at: new Date().toISOString(), cancelled_by: 'guest' })
      });
      if (!res.ok) {
        btn.disabled = false; btn.textContent = 'Yes, cancel my reservation';
        msg.style.display = 'block'; msg.className = 'msg error';
        msg.textContent = 'Something went wrong. Please try again.';
        return;
      }
      document.getElementById('content').style.display = 'none';
      var done = document.getElementById('done');
      done.style.display = 'block';
      var cin = booking.checkin || booking.check_in || '';
      var hoursUntil = cin ? (new Date(cin+'T00:00:00') - new Date()) / 3600000 : 999;
      document.getElementById('done-msg').textContent = hoursUntil >= 48
        ? 'Your reservation has been cancelled. A full refund will be issued when payments go live.'
        : 'Your reservation has been cancelled. No refund applies under the 48-hour policy.';
    }

    init();
  </script>
</body>
</html>
